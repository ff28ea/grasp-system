# Global runtime configuration for the grasp system.
# All dimensions in SI (meters, radians, seconds) unless explicitly noted.

logging:
  # Python logging level for the top-level "grasp.*" loggers.
  # One of DEBUG, INFO, WARNING, ERROR.
  level: INFO

camera:
  width: 640
  height: 480
  color_fps: 30
  depth_fps: 30
  depth_scale: 0.001          # RealSense depth units -> meters
  clip_distance_m: 1.5
  align_to: color
  warmup_frames: 30           # frames to skip so AE/AWB settle before first grab

chessboard:
  pattern_size: [11, 8]       # inner corners (cols, rows) for a 12x9 board
  square_size_m: 0.025        # edge length of one black square, meters

handeye:
  method: CALIB_HAND_EYE_PARK # CALIB_HAND_EYE_PARK | CALIB_HAND_EYE_DANIILIDIS
  min_poses: 15
  settle_time_s: 1.0

observe:
  move_speed_pct: 50
  arrive_timeout_s: 20.0

active_perception:
  enable: true
  near_height_m: 0.35         # camera height above object for close-up
  look_down_tilt_deg: 10.0    # tilt of camera optical axis away from world -z
  fuse_rough_weight: 0.3
  fuse_fine_weight: 0.7

perception:
  conf_threshold: 0.5
  min_mask_pixels: 400
  mask_erode_px: 2
  depth_trunc_m: 1.2
  # Ultralytics device hint. null lets YOLO pick (usually cpu); set to
  # "cuda:0" / "mps" / "cpu" explicitly to avoid the ~500 ms CPU hit on
  # the first forward pass.
  device: null
  # Number of extra attempts when perception throws a RuntimeError
  # (no detection, too-sparse cloud, etc). Each retry rereads the
  # arm pose and recomputes up_in_cam before capturing again.
  retries: 2
  statistical_outlier:
    nb_neighbors: 20
    std_ratio: 2.0
  voxel_size_m: 0.002
  plane_segmentation:
    distance_threshold_m: 0.006
    ransac_n: 3
    num_iterations: 1000
    # Max allowed angle (deg) between the RANSAC plane normal and the
    # base-frame +z (expressed in camera coords). Only planes within
    # this tolerance are treated as the support surface and removed;
    # the object's own dominant face is preserved.
    normal_tol_deg: 25.0
  icp:
    enable: false
    voxel_size_m: 0.003
    fitness_threshold: 0.6
    inlier_rmse_threshold_m: 0.005

grasp:
  approach_direction_world: [0.0, 0.0, -1.0]
  pre_grasp_offset_m: 0.10
  lift_height_m: 0.12
  opening_margin_m: 0.005
  # How much narrower than the object short axis the gripper closes to
  # when squeezing. Positive => over-close (produces grip force). If set
  # to 0 the jaws just touch the object surface and will almost always
  # slip; 2 mm is a conservative default for rigid items.
  close_overclose_m: 0.002
  default_effort_mNm: 1000
  # Optional override used only for the closing motion. Lets you squeeze
  # rigid items harder without also raising the holding torque used when
  # commanding pre-grasp or place openings. Falls back to
  # piper.default_effort_mNm when omitted.
  close_effort_mNm: 1000
  # Timeout for the feedback-driven close_until loop.
  close_timeout_s: 2.0
  # If the gripper opening stops changing by more than this (m) during
  # a ``stall_window`` (~0.25s) close_until treats that as "clamped on
  # an object" and returns successfully.
  close_stall_eps_m: 0.0003
  # After close_until finishes, the final opening must be within
  # grasp_check_tol_m of the expected object short axis and not below
  # grasp_check_min_m; otherwise the pipeline aborts (assumed slip /
  # miss). Tighten these if you operate on a small range of objects.
  grasp_check_tol_m: 0.006
  grasp_check_min_m: 0.003
  max_opening_m: 0.070        # PiPER parallel jaw 0..70 mm

place:
  # Base-frame xyz where picked items are released, and orientation for the
  # end-effector at release. Tilt/yaw are applied on top of a top-down frame
  # via camera_look_down_rotation, independently of the grasp orientation.
  xyz_m: [0.30, -0.15, 0.18]
  tilt_deg: 0.0
  yaw_deg: 0.0

motion:
  # Cartesian arrival tolerances used by PiperController.move_to_pose.
  pos_tol_m: 0.003
  ang_tol_deg: 1.0
  cartesian_timeout_s: 8.0
  # Minimum CAN receive frame rate (Hz) required before the pipeline
  # will attempt any motion. PiPER normally runs at ~200 Hz on a
  # healthy bus. Aborts early instead of sending commands into a
  # degraded link.
  min_can_fps: 50.0
  # Vertical distance to lift before homing in the safe-retreat path.
  # Ensures the tool clears the workspace before the joint-space move
  # to the observe pose.
  retreat_lift_m: 0.08

# Hard geometric guardrails evaluated on every planned grasp. Uncomment
# and tune for your workspace. Any limit set here short-circuits the
# motion phase with a human-readable message if violated.
workspace:
  # Z of the support surface in the base frame (m).
  table_z_m: 0.0
  # Minimum clearance the tool tip must keep above the table.
  safe_z_min_m: 0.005
  # Reachable rectangle: [[xmin, xmax], [ymin, ymax]] in m.
  xy_bounds_m: [[-0.40, 0.40], [-0.40, 0.40]]
  # Optional ceiling (m) -- useful if a camera rig or enclosure would
  # collide with the lift pose.
  z_max_m: 0.60

piper:
  can_port: can0
  joint_move_speed_pct: 30
  cartesian_move_speed_pct: 20
  default_effort_mNm: 1000
  # Arm installation orientation. Required on firmware >= V1.5-2 so
  # gravity compensation and IK are correct. One of:
  #   horizontal  -- base flat on the table, +z pointing up (the default)
  #   left        -- base mounted on a vertical wall on the robot's left
  #   right       -- base mounted on a vertical wall on the robot's right
  # Set to null to skip the write (e.g. older firmware).
  installation_pos: horizontal
  # One-time gripper teach-pendant parameter push. Older systems will
  # not report gripper feedback or respond to GripperCtrl until these
  # values have been written to the controller. Toggle `enable: true`
  # the first time you bring up a brand-new controller; once the values
  # persist in flash this can be turned off again.
  gripper_teach_pendant:
    enable: false
    stroke_mm: 100          # teach-pendant full stroke
    max_range_mm: 70        # gripper mechanical max opening

paths:
  intrinsics: configs/camera_intrinsics.npz
  t_eef_cam: configs/T_eef_cam.npy
  observe_joints: configs/observe_joints.npy
  dataset: datasets/my_first_project_v3i_yolov8/data.yaml
  model: models/best.pt
  classes: configs/classes.yaml
